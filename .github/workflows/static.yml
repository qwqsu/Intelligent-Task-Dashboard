name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["master"]
    paths:
      - 'Intelligent-Task-Dashboard/**'       # 前端源码
      - '.github/workflows/deploy.yml'        # 工作流本身
    paths-ignore:
      - 'README.md'
      - '**.md'                               # 所有 markdown 文档
      - 'Intelligent-Task-Dashboard-server/**' # 后端代码
      - 'docs/**'                             # 文档目录
  workflow_dispatch:   

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: Intelligent-Task-Dashboard/package-lock.json   # 前端目录下的锁文件

      - name: Install dependencies
        run: npm ci
        working-directory: ./Intelligent-Task-Dashboard   # 前端目录

      - name: Build
        run: npm run build
        working-directory: ./Intelligent-Task-Dashboard   # 前端目录

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Intelligent-Task-Dashboard/dist'        # 构建输出目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
