name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["master"]
    # ⭐ 只保留 paths（白名单），删掉 paths-ignore
    paths:
      - 'Intelligent-Task-Dashboard/**'       # 前端源码
      - '.github/workflows/static.yml'        # 工作流自身（文件名必须正确）
  workflow_dispatch:   # 手动触发保留

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: Intelligent-Task-Dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./Intelligent-Task-Dashboard

      - name: Build
        run: npm run build
        working-directory: ./Intelligent-Task-Dashboard

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Intelligent-Task-Dashboard/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
